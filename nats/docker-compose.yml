services:
  nats:
    image: nats:2.10
    container_name: via-nats
    command: ["-js", "-m", "8222"]
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - via-nats-data:/data
    networks:
      - via-net

volumes:
  via-nats-data:

networks:
  via-net:
    name: via-net
